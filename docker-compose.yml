version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: outfit-postgres
    environment:
      POSTGRES_DB: outfitdb
      POSTGRES_USER: outfit
      POSTGRES_PASSWORD: outfit1234
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data  # 데이터 영구 저장

volumes:
  postgres-data: