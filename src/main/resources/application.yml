spring:
  profiles:
    active: prod

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          kakao:
            client-id: ${KAKAO_CLIENT_ID:dev-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:dev-kakao-client-secret}
            scope: profile_nickname, profile_image, account_email
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            provider: kakao                    # ← provider 명시
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          naver:
            client-id: ${NAVER_CLIENT_ID:dev-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:dev-naver-client-secret}
            scope: name, email, profile_image
            authorization-grant-type: authorization_code
            provider: naver                    # ← provider 명시
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:
          kakao: # ← 카카오 provider 등록
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver: # ← 네이버 provider 등록
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000
  refresh-expiration: 604800000

aws:
  access-key-id: ${AWS_ACCESS_KEY_ID:dev-access-key}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:dev-secret-key}
  region: ${AWS_REGION:ap-northeast-2}
  s3:
    bucket-name: ${AWS_BUCKET_NAME:dev-bucket}

openai:
  keys:
    default: ${OPENAI_API_KEY:dev-openai-key}
    chat: ${OPENAI_API_KEY_CHAT:dev-openai-key-chat}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}
